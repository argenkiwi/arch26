[versions]
activityCompose = "1.13.0"
agp = "9.1.1"
sqldelight = "2.3.2"
arrowCore = "2.2.2.1"
koin-bom = "4.2.1"
koin-plugin = "0.6.2"
kotlin = "2.3.20"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.13.0"
nav3Core = "1.1.0"
kotlinSerialization = "2.3.20"
